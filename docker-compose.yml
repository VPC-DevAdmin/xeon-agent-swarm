version: "3.9"

services:

  # ── Redis Stack (adds RediSearch + RedisJSON for the upcoming corpus) ───────
  # Drop-in replacement for redis:7-alpine: standard Redis commands (pub/sub,
  # GET/SETEX used by backend.queue.task_queue) work unchanged; the Search and
  # JSON modules are there for the corpus vector store coming in a later PR.
  # Port 8001 exposes RedisInsight (browser UI) for debugging corpus indexes.
  redis:
    image: redis/redis-stack:latest
    ports:
      - "6479:6379"
      - "8001:8001"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Hugging Face Text Embeddings Inference (TEI) ─────────────────────────
  # Serves embeddings for the corpus vector store. BAAI/bge-small-en-v1.5
  # produces 384-dim vectors and runs comfortably on CPU.
  # Endpoint: POST /embed  body: {"inputs": ["text", ...]}  → [[float, ...], ...]
  tei-embedding:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-latest
    command: >
      --model-id ${EMBEDDING_MODEL:-BAAI/bge-small-en-v1.5}
      --port 8090
    ports: ["8090:8090"]
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
    volumes:
      - tei_data:/data

  # ── OPEA vLLM — CPU orchestrator (Qwen2.5-7B) ────────────────────────────
  vllm-orchestrator:
    image: opea/vllm:latest
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - VLLM_USE_V1=1
      - VLLM_OPENVINO_ENABLE_QUANTIZED_WEIGHTS=ON
      - VLLM_OPENVINO_KVCACHE_SPACE=8
    command: >
      --model ${ORCHESTRATOR_MODEL}
      --port 8080
      --max-model-len 4096
    ports: ["8080:8080"]
    volumes:
      - hf_cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/health', timeout=3).status == 200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 40
      start_period: 30s

  # ── OPEA vLLM — CPU worker (Phi-4-mini) ──────────────────────────────────
  vllm-worker-cpu:
    image: opea/vllm:latest
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - VLLM_USE_V1=1
      - VLLM_OPENVINO_ENABLE_QUANTIZED_WEIGHTS=ON
      - VLLM_OPENVINO_KVCACHE_SPACE=6
    command: >
      --model ${WORKER_CPU_MODEL}
      --port 8081
      --max-model-len 2048
      --disable-sliding-window
    ports: ["8081:8081"]
    volumes:
      - hf_cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8081/health', timeout=3).status == 200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 40
      start_period: 30s

  # ── OPEA vLLM — GPU worker (optional, Llama-3.1-8B) ─────────────────────
  vllm-worker-gpu:
    image: opea/vllm-gaudi:latest
    environment:
      - HF_TOKEN=${HF_TOKEN}
    command: >
      --model ${WORKER_GPU_MODEL}
      --port 8082
      --max-model-len 4096
    ports: ["8082:8082"]
    volumes:
      - hf_cache:/root/.cache/huggingface
    profiles: ["gpu"]       # only started with: docker compose --profile gpu up

  # ── OPEA vLLM — Vision validation spike (Phi-3.5-vision) ─────────────────
  # Validates that vLLM's CPU backend can serve a VLM before we invest in a
  # vision worker. Behind the `vision` profile so `docker compose up` is
  # unchanged. To test:
  #   docker compose --profile vision up -d vllm-vision
  #   scripts/test_vlm.sh <path-to-any.jpg|png>
  vllm-vision:
    image: opea/vllm:latest
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - VLLM_USE_V1=1
      - VLLM_OPENVINO_ENABLE_QUANTIZED_WEIGHTS=ON
      - VLLM_OPENVINO_KVCACHE_SPACE=6
    command: >
      --model ${VLM_MODEL:-microsoft/Phi-3.5-vision-instruct}
      --port 8084
      --max-model-len 4096
      --trust-remote-code
      --disable-sliding-window
    ports: ["8084:8084"]
    volumes:
      - hf_cache:/root/.cache/huggingface
    profiles: ["vision"]
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8084/health', timeout=3).status == 200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 60        # VLM weight download + load takes longer
      start_period: 60s

  # ── OPEA vLLM — single model A/B (Mistral-7B) ────────────────────────────
  vllm-single:
    image: opea/vllm:latest
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - VLLM_USE_V1=1
      - VLLM_OPENVINO_ENABLE_QUANTIZED_WEIGHTS=ON
      - VLLM_OPENVINO_KVCACHE_SPACE=8
    command: >
      --model ${SINGLE_MODEL}
      --port 8083
      --max-model-len 4096
    ports: ["8083:8083"]
    volumes:
      - hf_cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8083/health', timeout=3).status == 200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 40
      start_period: 30s

  # ── MCP servers ───────────────────────────────────────────────────────────
  mcp-web-search:
    build: ./mcp_servers/web_search
    ports: ["9401:9001"]
    environment:
      - BRAVE_API_KEY=${BRAVE_API_KEY:-}

  mcp-doc-retrieval:
    build: ./mcp_servers/doc_retrieval
    ports: ["9402:9002"]

  mcp-code-exec:
    build: ./mcp_servers/code_exec
    ports: ["9403:9003"]

  # ── Backend ───────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports: ["8000:8000"]
    env_file: .env
    # Override endpoints so the backend talks to peer services by their
    # Docker network names, regardless of what the user's .env says
    # (env.example uses localhost for devs running backend outside compose).
    environment:
      - ORCHESTRATOR_ENDPOINT=http://vllm-orchestrator:8080/v1
      - WORKER_CPU_ENDPOINT=http://vllm-worker-cpu:8081/v1
      # GPU worker is in the `gpu` profile and not started by default.
      # Leaving WORKER_GPU_ENDPOINT empty forces worker.py to route
      # GPU-preferred tasks to CPU instead of failing against an
      # unreachable host. To actually use GPU, run with `--profile gpu`
      # and override this to `http://vllm-worker-gpu:8082/v1`.
      - WORKER_GPU_ENDPOINT=
      - SINGLE_MODEL_ENDPOINT=http://vllm-single:8083/v1
      - REDIS_URL=redis://redis:6379
      - MCP_WEB_SEARCH_URL=http://mcp-web-search:9001
      - MCP_DOC_RETRIEVAL_URL=http://mcp-doc-retrieval:9002
      - MCP_CODE_EXEC_URL=http://mcp-code-exec:9003
      # Corpus embeddings (TEI service, BAAI/bge-small-en-v1.5, 384 dims)
      - TEI_ENDPOINT=http://tei-embedding:8090
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-BAAI/bge-small-en-v1.5}
      - EMBEDDING_DIM=${EMBEDDING_DIM:-384}
    depends_on:
      redis:
        condition: service_healthy
      vllm-orchestrator:
        condition: service_healthy
      vllm-worker-cpu:
        condition: service_healthy
      vllm-single:
        condition: service_healthy
    volumes:
      - ./config:/app/config:ro
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    ports: ["3000:3000"]
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_WS_URL=ws://localhost:8000

  # ── Observability ─────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports: ["9090:9090"]

volumes:
  hf_cache:
  redis_data:
  tei_data:
