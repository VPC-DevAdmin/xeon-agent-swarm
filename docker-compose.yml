services:

  # ── Redis Stack (adds RediSearch + RedisJSON for the corpus) ─────────────────
  # Drop-in replacement for redis:7-alpine: standard Redis commands (pub/sub,
  # GET/SETEX used by backend.queue.task_queue) work unchanged; the Search and
  # JSON modules are there for the corpus vector store.
  # Port 8001 exposes RedisInsight (browser UI) for debugging corpus indexes.
  redis:
    image: redis/redis-stack:latest
    ports:
      - "6479:6379"
      - "8001:8001"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Hugging Face Text Embeddings Inference (TEI) ─────────────────────────
  # Serves embeddings for the corpus vector store. BAAI/bge-small-en-v1.5
  # produces 384-dim vectors and runs comfortably on CPU.
  # Endpoint: POST /embed  body: {"inputs": ["text", ...]}  → [[float, ...], ...]
  tei-embedding:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-latest
    command: >
      --model-id ${EMBEDDING_MODEL:-BAAI/bge-small-en-v1.5}
      --port 8090
    ports: ["8091:8090"]
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
    volumes:
      - tei_data:/data

  # ── Single shared text engine (Mistral-7B-Instruct-v0.3) ─────────────────
  #
  # Serves ALL text inference roles: orchestrator, workers, validator, reducer.
  # Specialization comes from contract fields (objective/scope/success_criteria)
  # injected into each role's prompt — not from separate models.
  #
  # Built from docker/vllm-cpu/Dockerfile using the native vLLM CPU wheel.
  #
  # CPU parallelism model: the vLLM CPU backend is single-process and uses
  # OpenMP intra-op thread parallelism — NOT GPU-style multiprocess TP.
  # Do NOT pass --tensor-parallel-size >1 or --distributed-executor-backend mp.
  # Instead, set OMP_NUM_THREADS=64 (all cores) and optionally bind with
  # VLLM_CPU_OMP_THREADS_BIND to control NUMA locality.
  #
  # Build: docker compose build vllm-text
  # To pin a vLLM version: set VLLM_VERSION=x.y.z in .env before building.
  vllm-text:
    build:
      context: ./docker/vllm-cpu
      args:
        VLLM_VERSION: ${VLLM_VERSION:-}
    environment:
      - HF_TOKEN=${HF_TOKEN}
      # OpenMP thread count — set to total physical cores on the socket.
      # On Xeon 6 GNR with 64 cores: OMP_NUM_THREADS=64
      - OMP_NUM_THREADS=${OMP_NUM_THREADS:-64}
      # Optional NUMA binding. "auto" lets vLLM pick; explicit ranges can help
      # on multi-socket systems. Leave as "auto" for single-socket Xeon.
      - VLLM_CPU_OMP_THREADS_BIND=${VLLM_CPU_OMP_THREADS_BIND:-auto}
      # KV cache in GB (single-process pool, not per-worker)
      - VLLM_CPU_KVCACHE_SPACE=${VLLM_CPU_KVCACHE_SPACE:-64}
    command: >
      --model ${TEXT_ENGINE_MODEL:-mistralai/Mistral-7B-Instruct-v0.3}
      --port 8080
      --max-model-len ${TEXT_MAX_MODEL_LEN:-16384}
      --max-num-seqs ${TEXT_MAX_NUM_SEQS:-16}
      --dtype bfloat16
    ports: ["8080:8080"]
    volumes:
      - hf_cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/health', timeout=3).status == 200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 60
      start_period: 300s   # cold start: HF model download + JIT compile

  # ── Vision engine (Phi-3.5-vision-instruct) ────────────────────────────────
  # Separate engine — modality requires a different model architecture.
  # Kept behind the `vision` profile to avoid loading by default.
  # To enable: docker compose --profile vision up -d vllm-vision
  # Then set VLM_ENDPOINT=http://vllm-vision:8084/v1 in .env and restart backend.
  vllm-vision:
    image: opea/vllm:latest   # OpenVINO backend — vision models don't need native TP
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - VLLM_USE_V1=1
      - VLLM_OPENVINO_ENABLE_QUANTIZED_WEIGHTS=ON
      - VLLM_OPENVINO_KVCACHE_SPACE=6
    command: >
      --model ${VLM_MODEL:-microsoft/Phi-3.5-vision-instruct}
      --port 8084
      --max-model-len 4096
      --trust-remote-code
      --disable-sliding-window
    ports: ["8084:8084"]
    volumes:
      - hf_cache:/root/.cache/huggingface
    profiles: ["vision"]
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8084/health', timeout=3).status == 200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 60
      start_period: 60s

  # ── MCP servers ───────────────────────────────────────────────────────────
  mcp-web-search:
    build: ./mcp_servers/web_search
    ports: ["9401:9001"]
    environment:
      - BRAVE_API_KEY=${BRAVE_API_KEY:-}

  mcp-doc-retrieval:
    build: ./mcp_servers/doc_retrieval
    ports: ["9402:9002"]
    environment:
      - REDIS_URL=redis://redis:6379
      - TEI_ENDPOINT=http://tei-embedding:8090
      - EMBEDDING_DIM=${EMBEDDING_DIM:-384}
    depends_on:
      redis:
        condition: service_healthy

  mcp-code-exec:
    build: ./mcp_servers/code_exec
    ports: ["9403:9003"]

  # ── Backend ───────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports: ["8000:8000"]
    env_file: .env
    # Override endpoints so the backend talks to peer services by their
    # Docker network names, regardless of what the user's .env says.
    environment:
      # Single text engine for orchestrator, workers, validator, reducer
      - TEXT_ENGINE_ENDPOINT=http://vllm-text:8080/v1
      - TEXT_ENGINE_MODEL=${TEXT_ENGINE_MODEL:-mistralai/Mistral-7B-Instruct-v0.3}
      # Legacy env vars — kept so old code that reads them still works
      - ORCHESTRATOR_ENDPOINT=http://vllm-text:8080/v1
      - ORCHESTRATOR_MODEL=${TEXT_ENGINE_MODEL:-mistralai/Mistral-7B-Instruct-v0.3}
      # Worker concurrency semaphore
      - WORKER_CONCURRENCY=${WORKER_CONCURRENCY:-8}
      # Vision worker — only active when started with --profile vision
      - VLM_ENDPOINT=${VLM_ENDPOINT:-}
      - VLM_MODEL=${VLM_MODEL:-microsoft/Phi-3.5-vision-instruct}
      # Redis / corpus / embeddings
      - REDIS_URL=redis://redis:6379
      - TEI_ENDPOINT=http://tei-embedding:8090
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-BAAI/bge-small-en-v1.5}
      - EMBEDDING_DIM=${EMBEDDING_DIM:-384}
      # MCP servers
      - MCP_WEB_SEARCH_URL=http://mcp-web-search:9001
      - MCP_DOC_RETRIEVAL_URL=http://mcp-doc-retrieval:9002
      - MCP_CODE_EXEC_URL=http://mcp-code-exec:9003
      # File paths
      - IMAGE_DIR=/data/images
      - AUDIO_DIR=/data/audio
      - PDF_CACHE_DIR=/data/pdf_cache
    depends_on:
      redis:
        condition: service_healthy
      vllm-text:
        condition: service_healthy
    volumes:
      - ./config:/app/config:ro
      - image_data:/data/images
      - audio_data:/data/audio
      - pdf_data:/data/pdf_cache
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    ports: ["3000:3000"]
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_WS_URL=ws://localhost:8000

  # ── Observability ─────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports: ["9090:9090"]

volumes:
  hf_cache:
  redis_data:
  tei_data:
  image_data:
  pdf_data:
  audio_data:
